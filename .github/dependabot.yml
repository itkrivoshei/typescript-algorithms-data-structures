version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: Europe/Berlin
    open-pull-requests-limit: 3
    commit-message:
      prefix: deps
    ignore:
      - dependency-name: '*'
        update-types:
          - version-update:semver-major

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:30'
      timezone: Europe/Berlin
    open-pull-requests-limit: 3
    commit-message:
      prefix: deps
    ignore:
      - dependency-name: '*'
        update-types:
          - version-update:semver-major
