name: Dependabot Auto Merge

on:
  workflow_run:
    workflows: ['CI/CD']
    types: [completed]

permissions:
  actions: read
  contents: write
  pull-requests: write

concurrency:
  group: dependabot-auto-merge-${{ github.event.workflow_run.id }}
  cancel-in-progress: false

jobs:
  merge:
    name: Merge Dependabot PR after green CI
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Merge Dependabot pull request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          set -euo pipefail

          PR_NUMBER="$(python3 - <<'PY'
          import json
          import os

          with open(os.environ["GITHUB_EVENT_PATH"], encoding="utf-8") as event_file:
              payload = json.load(event_file)

          pull_requests = payload.get("workflow_run", {}).get("pull_requests", [])
          print(pull_requests[0]["number"] if pull_requests else "")
          PY
          )"

          if [ -z "$PR_NUMBER" ]; then
            echo "No pull request is attached to this workflow run."
            exit 0
          fi

          AUTHOR="$(gh pr view "$PR_NUMBER" --repo "$REPO" --json author --jq '.author.login')"
          STATE="$(gh pr view "$PR_NUMBER" --repo "$REPO" --json state --jq '.state')"
          IS_DRAFT="$(gh pr view "$PR_NUMBER" --repo "$REPO" --json isDraft --jq '.isDraft')"

          if [ "$AUTHOR" != "dependabot[bot]" ]; then
            echo "PR #$PR_NUMBER was created by $AUTHOR, not Dependabot. Skipping."
            exit 0
          fi

          if [ "$STATE" != "OPEN" ]; then
            echo "PR #$PR_NUMBER is not open. Skipping."
            exit 0
          fi

          if [ "$IS_DRAFT" = "true" ]; then
            echo "PR #$PR_NUMBER is draft. Skipping."
            exit 0
          fi

          gh pr merge "$PR_NUMBER" --repo "$REPO" --squash --delete-branch
